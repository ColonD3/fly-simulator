<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elytra Course</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="hud">
      <div class="title">ELYTRA COURSE</div>
      <div id="score">Score: 0</div>
      <div id="hoops">Hoops: 0</div>
      <div id="speed">Speed: 0</div>
      <div class="hint">Click to lock cursor · Mouse steer · WASD strafe · Space thrust · Esc release cursor</div>
    </div>
    <button id="invertYToggle" type="button">Invert Y: Off</button>
    <canvas id="scene"></canvas>
    <div id="mobileControls" aria-hidden="true">
      <div class="control-column">
        <div id="moveStick" class="stick-pad">
          <div id="moveKnob" class="stick-knob"></div>
        </div>
      </div>
      <div class="control-column right">
        <div id="lookPad" class="look-pad">LOOK</div>
        <button class="ctrl-btn thrust" data-key="Space">THRUST</button>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
